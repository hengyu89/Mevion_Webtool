<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mevion Webtool</title>
  <link rel="icon" href="./assets/Service%20tool.ico?v=20260724-1" type="image/x-icon" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/service-frame.css" />
  <link rel="stylesheet" href="./css/pages-home.css?v=20260724-3" />

<body>
  <div class="page-bg">
    <div id="appShell" class="app-shell service-shell sidebar-collapsed">
      <aside id="leftSidebar" class="left-sidebar service-sidebar">
        <button id="menuToggleBtn" class="menu-toggle-btn" type="button" title="展开/收起菜单" aria-label="展开/收起菜单">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div class="logo-card card service-logo-card">
          <div class="logo-title">MEVION</div>
          <div class="logo-subtitle">Service Analysis Toolkit</div>
        </div>

        <nav id="menuContainer" class="menu-list"></nav>
      </aside>

      <main class="main-content service-main">
        <div id="mainContent" class="service-main-content"></div>
      </main>
    </div>
    <div class="service-status-bar">
      <button
        id="serviceHomeBtn"
        class="service-home-btn"
        type="button"
        title="返回首页"
        aria-label="返回首页"
      >首页</button>
      <a
        id="serviceDownloadBtn"
        class="service-download-btn"
        href="./downloads/TJH_Tool_v2.1.1_%E8%A7%A3%E5%8E%8B%E5%90%8E%E4%BD%BF%E7%94%A8.zip"
        download="TJH_Tool_v2.1.1_解压后使用.zip"
        title="下载整个网页到本地，可离线使用"
        aria-label="下载整个网页到本地，可离线使用"
      >Download</a>
      <span class="service-mode-text">SERVICE MODE: Not for Treatment Use</span>
      <span class="service-spacer"></span>
      <span>View: [service]</span>
      <span>S250i State:</span>
      <strong>0013</strong>
      <span class="service-state-chip">Tongji</span>
      <span id="serviceClock" class="service-clock"></span>
    </div>
  </div>

  <script src="./data/pages.js?v=20260724-6"></script>
  <script src="./data/interlocks.js"></script>
  <script src="./js/menu.js"></script>
  <script src="./js/tool-status-registry.js"></script>

  <script src="./js/page-modules/tc-shift-tool.js?v=20260724-2"></script>
  <script src="./js/page-modules/patient-counter-tool.js"></script>
  <script src="./js/page-modules/tic-monitor-tool.js?v=20260724-6"></script>
  <script src="./js/page-modules/tic-sweep-tool.js?v=20260724-1"></script>
  <script src="./js/page-modules/no-scanning-tool.js?v=20260724-7"></script>
  <script src="./js/app.js?v=20260724-1"></script>
