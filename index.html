<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mevion Webtool</title>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/service-frame.css" />
  <link rel="stylesheet" href="./css/pages-home.css" />
  <link rel="stylesheet" href="./css/tool-tc-shift.css" />
  <link rel="stylesheet" href="./css/tool-patient-counter.css" />
  <link rel="stylesheet" href="./css/tool-tic-monitor.css" />
  <link rel="stylesheet" href="./css/tool-tic-sweep.css" />
  <link rel="stylesheet" href="./css/company-skin.css" />
</head>
<body>
  <div class="page-bg">
    <div id="appShell" class="app-shell service-shell sidebar-collapsed">
      <aside id="leftSidebar" class="left-sidebar service-sidebar">
        <button id="menuToggleBtn" class="menu-toggle-btn" type="button" title="展开/收起菜单" aria-label="展开/收起菜单">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div class="logo-card card service-logo-card">
          <div class="logo-title">MEVION</div>
          <div class="logo-subtitle">On-site Tools</div>
        </div>

        <nav id="menuContainer" class="menu-list"></nav>
      </aside>

      <main class="main-content service-main">
        <div id="mainContent" class="service-main-content"></div>
      </main>
    </div>
    <div class="service-status-bar">
      <button id="serviceMenuBtn" class="service-menu-btn" type="button" aria-haspopup="true" aria-expanded="false">Menu</button>
      <a
        id="serviceDownloadBtn"
        class="service-download-btn"
        href="./downloads/TJH_Tool_v2.0.1.zip"
        download="TJH_Tool_v2.0.1.zip"
        title="下载整个网页到本地，可离线使用"
        aria-label="下载整个网页到本地，可离线使用"
      >Download</a>
      <div id="serviceMenuPopup" class="service-menu-popup" hidden></div>
      <span class="service-mode-text">SERVICE MODE: Not for Treatment Use</span>
      <span class="service-spacer"></span>
      <span>View: [service]</span>
      <span>S250i State:</span>
      <strong>0013</strong>
      <span class="service-state-chip">Tongji</span>
      <span id="serviceClock" class="service-clock"></span>
    </div>
  </div>

  <script src="./data/pages.js"></script>
  <script src="./js/menu.js"></script>
  <script src="./js/tool-status-registry.js"></script>
  <script src="./js/content.js"></script>
  <script src="./js/tc-log-file-store.js"></script>
  <script src="./js/page-modules/tc-shift-tool.js"></script>
  <script src="./js/page-modules/patient-counter-tool.js"></script>
  <script src="./js/page-modules/tic-monitor-tool.js"></script>
  <script src="./js/page-modules/tic-sweep-tool.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
